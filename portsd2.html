<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>rp vs sp Interactive Graph</title>
  <style>
    :root { color-scheme: light; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background:#fff; color:#000;
    }
    .wrap{
      max-width: 980px;
      margin: 0 auto;
      padding: 18px 16px 24px;
    }
    h1{ font-size:18px; margin:0 0 10px; font-weight:650; }
    .controls{
      border:1px solid #000;
      padding:12px;
      margin-bottom:12px;
    }
    .grid{
      display:grid;
      grid-template-columns: repeat(6, minmax(110px, 1fr));
      gap:10px 12px;
      align-items:end;
    }
    .field label{
      display:block;
      font-size:12px;
      margin-bottom:4px;
    }
    .field input{
      width:100%;
      padding:8px 10px;
      border:1px solid #000;
      border-radius:0;
      font-size:14px;
      background:#fff;
      color:#000;
      box-sizing:border-box;
    }
    .btnrow{
      display:flex;
      gap:10px;
      align-items:center;
      margin-top:10px;
      flex-wrap:wrap;
    }
    button{
      padding:8px 12px;
      border:1px solid #000;
      background:#fff;
      color:#000;
      cursor:pointer;
      font-size:14px;
    }
    button:active{ transform: translateY(1px); }
    .note{ font-size:12px; }
    .chartbox{
      border:1px solid #000;
      padding:10px;
    }
    canvas{ display:block; width:100%; height:auto; }
    .sliderbox{
      border:1px solid #000;
      padding:12px;
      margin-top:12px;
    }
    .sliderrow{
      display:flex;
      gap:12px;
      align-items:center;
      flex-wrap:wrap;
    }
    input[type="range"]{ width: min(520px, 100%); }
    .mono{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    .err{
      margin-top:8px;
      font-size:12px;
      color:#000;
    }
    @media (max-width: 820px){
      .grid{ grid-template-columns: repeat(2, minmax(140px, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Interactive Graph: <span class="mono">rp</span> (y-axis) vs <span class="mono">sp</span> (x-axis)</h1>

    <div class="controls" aria-label="inputs above graph">
      <div class="grid">
        <div class="field">
          <label for="wa">wa (%) [0–100]</label>
          <input id="wa" type="number" step="0.1" min="0" max="100" />
        </div>

        <div class="field">
          <label for="ra">ra (%) [0–100]</label>
          <input id="ra" type="number" step="0.1" min="0" max="100" />
        </div>

        <div class="field">
          <label for="sa">sa (%) [0–300]</label>
          <input id="sa" type="number" step="0.1" min="0" max="300" />
        </div>

        <div class="field">
          <label for="rb">rb (%) [0–100]</label>
          <input id="rb" type="number" step="0.1" min="0" max="100" />
        </div>

        <div class="field">
          <label for="sb">sb (%) [0–300]</label>
          <input id="sb" type="number" step="0.1" min="0" max="300" />
        </div>

        <div class="field">
          <label>&nbsp;</label>
          <button id="reset" type="button" title="Reset to initial values">Reset</button>
        </div>
      </div>

      <div class="btnrow">
        <div class="note">
          Uses:
          <span class="mono">sp = sqrt(wa²·sa² + (1−wa)²·sb² + wa·(1−wa)·sa·sb·rab)</span>,
          <span class="mono">rp = wa·ra + (1−wa)·rb</span>
        </div>
      </div>

      <div id="err" class="err" role="status" aria-live="polite"></div>
    </div>

    <div class="chartbox">
      <canvas id="chart" width="900" height="520" aria-label="rp vs sp chart"></canvas>
    </div>

    <div class="sliderbox" aria-label="slider below graph">
      <div class="sliderrow">
        <label for="rab" class="mono">rab (correlation):</label>
        <input id="rab" type="range" min="-1" max="1" step="0.01" />
        <span class="mono" id="rabVal">0.00</span>
      </div>
      <div class="note" style="margin-top:6px;">
        Slide <span class="mono">rab</span> to update the curve.
      </div>
    </div>
  </div>

<script>
(function(){
  // ---------- Defaults ----------
  const DEFAULTS = {
    wa: 50,   // %
    ra: 10,   // %
    sa: 10,   // %
    rb: 15,   // %
    sb: 20,   // %
    rab: 0.0  // [-1, 1]
  };

  // ---------- Elements ----------
  const el = {
    wa: document.getElementById('wa'),
    ra: document.getElementById('ra'),
    sa: document.getElementById('sa'),
    rb: document.getElementById('rb'),
    sb: document.getElementById('sb'),
    rab: document.getElementById('rab'),
    rabVal: document.getElementById('rabVal'),
    reset: document.getElementById('reset'),
    canvas: document.getElementById('chart'),
    err: document.getElementById('err')
  };
  const ctx = el.canvas.getContext('2d');

  // ---------- Helpers ----------
  const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
  const isFiniteNumber = (v) => Number.isFinite(v) && !Number.isNaN(v);

  function setDefaults(){
    el.wa.value = DEFAULTS.wa;
    el.ra.value = DEFAULTS.ra;
    el.sa.value = DEFAULTS.sa;
    el.rb.value = DEFAULTS.rb;
    el.sb.value = DEFAULTS.sb;
    el.rab.value = DEFAULTS.rab;
    el.rabVal.textContent = Number(DEFAULTS.rab).toFixed(2);
  }

  function readInputs(){
    const waPct = Number(el.wa.value);
    const raPct = Number(el.ra.value);
    const saPct = Number(el.sa.value);
    const rbPct = Number(el.rb.value);
    const sbPct = Number(el.sb.value);
    const rab = Number(el.rab.value);

    // Validate numeric
    const nums = { waPct, raPct, saPct, rbPct, sbPct, rab };
    for (const [k,v] of Object.entries(nums)){
      if (!isFiniteNumber(v)){
        return { ok:false, msg:`"${k}" must be a number.` };
      }
    }

    // Clamp to required ranges
    const wa = clamp(waPct, 0, 100) / 100;      // convert to [0,1]
    const ra = clamp(raPct, 0, 100) / 100;      // convert to [0,1]
    const rb = clamp(rbPct, 0, 100) / 100;
    const sa = clamp(saPct, 0, 300) / 100;      // convert % to decimal (e.g., 10% => 0.10)
    const sb = clamp(sbPct, 0, 300) / 100;
    const r = clamp(rab, -1, 1);

    return { ok:true, wa, ra, rb, sa, sb, rab:r };
  }

  function computePoint(w, ra, rb, sa, sb, rab){
    // sp = sqrt( w^2*sa^2 + (1-w)^2*sb^2 + w*(1-w)*sa*sb*rab )
    // rp = w*ra + (1-w)*rb
    const term = (w*w*sa*sa) + ((1-w)*(1-w)*sb*sb) + (w*(1-w)*sa*sb*rab);
    const sp = Math.sqrt(Math.max(0, term));
    const rp = (w*ra) + ((1-w)*rb);
    return { sp, rp };
  }

  function buildCurve(params){
    // Plot across w in [0,1] to show the whole curve, not just the current wa.
    const N = 401;
    const pts = [];
    for (let i=0;i<N;i++){
      const w = i/(N-1);
      pts.push(computePoint(w, params.ra, params.rb, params.sa, params.sb, params.rab));
    }
    return pts;
  }

  // ---------- Drawing ----------
  function clear(){
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,el.canvas.width, el.canvas.height);
    ctx.fillStyle = '#fff';
    ctx.fillRect(0,0,el.canvas.width, el.canvas.height);
  }

  function drawAxes(plot){
    const {x0,y0,w,h, xMin,xMax, yMin,yMax} = plot;

    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;

    // border
    ctx.strokeRect(x0, y0, w, h);

    // axes at left/bottom of plot area
    // x-axis line (bottom)
    ctx.beginPath();
    ctx.moveTo(x0, y0+h);
    ctx.lineTo(x0+w, y0+h);
    ctx.stroke();

    // y-axis line (left)
    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.lineTo(x0, y0+h);
    ctx.stroke();

    // ticks
    const xTicks = 6;
    const yTicks = 6;

    ctx.fillStyle = '#000';
    ctx.font = '12px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial';
    ctx.textBaseline = 'top';

    for (let i=0;i<=xTicks;i++){
      const t = i/xTicks;
      const x = x0 + t*w;
      ctx.beginPath();
      ctx.moveTo(x, y0+h);
      ctx.lineTo(x, y0+h+6);
      ctx.stroke();

      const val = xMin + t*(xMax-xMin);
      const label = (val*100).toFixed(1) + '%';
      ctx.textAlign = 'center';
      ctx.fillText(label, x, y0+h+8);
    }

    ctx.textBaseline = 'middle';
    for (let j=0;j<=yTicks;j++){
      const t = j/yTicks;
      const y = y0+h - t*h;
      ctx.beginPath();
      ctx.moveTo(x0-6, y);
      ctx.lineTo(x0, y);
      ctx.stroke();

      const val = yMin + t*(yMax-yMin);
      const label = (val*100).toFixed(1) + '%';
      ctx.textAlign = 'right';
      ctx.fillText(label, x0-8, y);
    }

    // axis labels
    // x label
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.font = '14px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial';
    ctx.fillText('sp', x0 + w/2, el.canvas.height - 8);

    // y label (rotated)
    ctx.save();
    ctx.translate(14, y0 + h/2);
    ctx.rotate(-Math.PI/2);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText('rp', 0, 0);
    ctx.restore();

    // title-ish range note in plot corner (small)
    ctx.font = '12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText('Units: decimals shown as %', x0+8, y0+8);
  }

  function toScreen(plot, sp, rp){
    const {x0,y0,w,h, xMin,xMax, yMin,yMax} = plot;
    const x = x0 + (sp - xMin) / (xMax - xMin) * w;
    const y = y0 + h - (rp - yMin) / (yMax - yMin) * h;
    return {x,y};
  }

  function drawCurve(plot, pts){
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i=0;i<pts.length;i++){
      const p = toScreen(plot, pts[i].sp, pts[i].rp);
      if (i===0) ctx.moveTo(p.x,p.y);
      else ctx.lineTo(p.x,p.y);
    }
    ctx.stroke();
  }

  function drawMarker(plot, sp, rp){
    const p = toScreen(plot, sp, rp);
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
    ctx.fill();
  }

  function niceMax(v){
    // make a "nice" upper bound slightly above v
    if (v <= 0) return 0.01;
    const exp = Math.floor(Math.log10(v));
    const base = Math.pow(10, exp);
    const m = v/base;
    let n;
    if (m <= 1) n = 1;
    else if (m <= 2) n = 2;
    else if (m <= 5) n = 5;
    else n = 10;
    return n*base;
  }

  function render(){
    const inputs = readInputs();
    if (!inputs.ok){
      el.err.textContent = inputs.msg;
      return;
    }
    el.err.textContent = '';

    // Show rab value
    el.rabVal.textContent = inputs.rab.toFixed(2);

    const curve = buildCurve(inputs);
    const current = computePoint(inputs.wa, inputs.ra, inputs.rb, inputs.sa, inputs.sb, inputs.rab);

    // Determine ranges from curve + marker
    let xMax = 0, yMax = 0;
    for (const p of curve){
      if (p.sp > xMax) xMax = p.sp;
      if (p.rp > yMax) yMax = p.rp;
    }
    xMax = Math.max(xMax, current.sp);
    yMax = Math.max(yMax, current.rp);

    const plot = {
      x0: 80,
      y0: 20,
      w: el.canvas.width - 110,
      h: el.canvas.height - 90,
      xMin: 0,
      xMax: niceMax(xMax),
      yMin: 0,
      yMax: niceMax(yMax)
    };

    clear();
    drawAxes(plot);
    drawCurve(plot, curve);
    drawMarker(plot, current.sp, current.rp);

    // Current values readout (top-right in plot area)
    ctx.fillStyle = '#000';
    ctx.font = '12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'top';
    const lines = [
      `wa=${(inputs.wa*100).toFixed(1)}%  rab=${inputs.rab.toFixed(2)}`,
      `sp=${(current.sp*100).toFixed(2)}%`,
      `rp=${(current.rp*100).toFixed(2)}%`
    ];
    const x = plot.x0 + plot.w - 8;
    let y = plot.y0 + 8;
    for (const line of lines){
      ctx.fillText(line, x, y);
      y += 16;
    }
  }

  // ---------- Events ----------
  function hook(){
    const inputs = [el.wa, el.ra, el.sa, el.rb, el.sb];
    for (const inp of inputs){
      inp.addEventListener('input', () => {
        // keep the displayed values inside bounds (soft clamp on blur)
        render();
      });
      inp.addEventListener('blur', () => {
        // hard clamp on blur so UI stays within constraints
        const id = inp.id;
        let v = Number(inp.value);
        if (!isFiniteNumber(v)) v = 0;
        if (id === 'wa') v = clamp(v, 0, 100);
        if (id === 'ra' || id === 'rb') v = clamp(v, 0, 100);
        if (id === 'sa' || id === 'sb') v = clamp(v, 0, 300);
        inp.value = v;
        render();
      });
    }

    el.rab.addEventListener('input', () => render());

    el.reset.addEventListener('click', () => {
      setDefaults();
      render();
    });

    // Redraw on resize (keeps canvas crisp by matching device pixel ratio)
    function resizeCanvas(){
      const dpr = window.devicePixelRatio || 1;
      const cssWidth = el.canvas.clientWidth || 900;
      const cssHeight = Math.round(cssWidth * (520/900));
      el.canvas.style.height = cssHeight + 'px';

      el.canvas.width = Math.round(cssWidth * dpr);
      el.canvas.height = Math.round(cssHeight * dpr);
      ctx.setTransform(dpr,0,0,dpr,0,0); // draw in CSS pixels
      // But our drawing uses canvas pixels; reset after setting transform:
      ctx.setTransform(1,0,0,1,0,0);

      // Re-render using the new internal size
      render();
    }

    // Make the canvas responsive while preserving aspect ratio
    const ro = new ResizeObserver(() => resizeCanvas());
    ro.observe(el.canvas);

    // initial
    setDefaults();
    // ensure slider text matches
    el.rabVal.textContent = Number(el.rab.value).toFixed(2);
    render();
  }

  hook();
})();
</script>
</body>
</html>
