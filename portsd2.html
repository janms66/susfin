<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Portfolio Correlation, 2-Asset Case</title>

  <!-- MathJax for nice math notation -->
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(', '\\)'], ['$', '$']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #fff;
      color: #000;
    }
    .wrap {
      max-width: 980px;
      margin: 18px auto;
      padding: 0 14px 18px;
    }
    h1 {
      font-size: 20px;
      margin: 0 0 12px 0;
      font-weight: 650;
    }

    /* Controls layout */
    .controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(130px, 1fr));
      gap: 12px;
      align-items: end;
      margin-bottom: 10px;
    }
    .field label {
      display: block;
      font-size: 12px;
      margin: 0 0 6px 0;
    }
    input[type="number"] {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 10px;
      border: 1px solid #000;
      border-radius: 10px;
      background: #fff;
      color: #000;
      font-size: 14px;
    }

    .sliders {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 8px 0 10px;
    }
    .sliderBlock {
      border: 1px solid #000;
      border-radius: 14px;
      padding: 10px 12px 12px;
    }
    .sliderBlock .topRow {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }
    .sliderBlock .topRow label {
      font-size: 12px;
      margin: 0;
    }
    .sliderBlock .value {
      font-variant-numeric: tabular-nums;
      font-size: 12px;
    }
    input[type="range"] {
      width: 100%;
      accent-color: #000;
    }

    .rowActions {
      display: flex;
      justify-content: flex-end;
      margin: 6px 0 12px;
    }
    button {
      padding: 8px 12px;
      border-radius: 12px;
      border: 1px solid #000;
      background: #fff;
      color: #000;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #f5f5f5; }

    .formula {
      border-top: 1px solid #000;
      border-bottom: 1px solid #000;
      padding: 10px 0;
      margin: 10px 0 12px;
      font-size: 16px;
      text-align: center;
    }

    .canvasWrap {
      border: 1px solid #000;
      border-radius: 16px;
      padding: 10px;
      background: #fff;
    }
    canvas {
      width: 100%;
      height: 520px;
      display: block;
      background: #fff;
      border-radius: 12px;
    }

    @media (max-width: 760px) {
      .controls { grid-template-columns: repeat(2, minmax(130px, 1fr)); }
      .sliders { grid-template-columns: 1fr; }
      canvas { height: 460px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Portfolio Correlation, 2-Asset Case</h1>

    <!-- Entry boxes above graph -->
    <div class="controls">
      <div class="field">
        <label for="ra">return A</label>
        <input id="ra" type="number" min="0" max="30" step="0.1" />
      </div>

      <div class="field">
        <label for="rb">return B</label>
        <input id="rb" type="number" min="0" max="30" step="0.1" />
      </div>

      <div class="field">
        <label for="sa">standard deviation A</label>
        <input id="sa" type="number" min="0" max="90" step="0.1" />
      </div>

      <div class="field">
        <label for="sb">standard deviation B</label>
        <input id="sb" type="number" min="0" max="90" step="0.1" />
      </div>
    </div>

    <!-- Sliders below entry boxes but above graph -->
    <div class="sliders">
      <div class="sliderBlock">
        <div class="topRow">
          <label for="waSlider">weight in A</label>
          <div class="value"><span id="waVal">50</span>%</div>
        </div>
        <input id="waSlider" type="range" min="0" max="100" step="1" />
      </div>

      <div class="sliderBlock">
        <div class="topRow">
          <label for="rabSlider">correlation between A and B</label>
          <div class="value"><span id="rabVal">1.00</span></div>
        </div>
        <input id="rabSlider" type="range" min="-1" max="1" step="0.01" />
      </div>
    </div>

    <div class="rowActions">
      <button id="resetBtn" type="button">Reset</button>
    </div>

    <!-- Formula indicated between parameter entry boxes and graph -->
    <div class="formula">
      \( \sigma_{P}=\sqrt{w_{A}^{2}\sigma_{A}^{2}+w_{B}^{2}\sigma_{B}^{2}+2w_{A}w_{B}\sigma_{A}\sigma_{B}\rho_{AB}} \)
    <br/>
      \( r_{P}=w_{A}r_{A}+w_{B}r_{B} \)
    </div>
    
    <div class="canvasWrap">
      <canvas id="chart" width="960" height="520" aria-label="Portfolio chart"></canvas>
    </div>
  </div>

  <script>
    // ---- Helpers ----
    const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
    const fmtPct = (x) => (x * 100).toFixed(1) + "%";
    const fmtPct0 = (x) => Math.round(x * 100) + "%";

    // ---- DOM ----
    const raEl = document.getElementById("ra");
    const rbEl = document.getElementById("rb");
    const saEl = document.getElementById("sa");
    const sbEl = document.getElementById("sb");

    const waSlider = document.getElementById("waSlider");
    const rabSlider = document.getElementById("rabSlider");
    const waVal = document.getElementById("waVal");
    const rabVal = document.getElementById("rabVal");

    const resetBtn = document.getElementById("resetBtn");
    const canvas = document.getElementById("chart");
    const ctx = canvas.getContext("2d");

    // ---- Initial values (percent inputs are in 0..100) ----
    const defaults = {
      waPct: 50,
      raPct: 10,
      saPct: 10,
      rbPct: 15,
      sbPct: 20,
      rab: 0.5
    };

    function setDefaults() {
      raEl.value = defaults.raPct;
      rbEl.value = defaults.rbPct;
      saEl.value = defaults.saPct;
      sbEl.value = defaults.sbPct;
      waSlider.value = defaults.waPct;
      rabSlider.value = defaults.rab.toFixed(2);

      waVal.textContent = String(defaults.waPct);
      rabVal.textContent = defaults.rab.toFixed(2);

      draw();
    }

    // ---- Portfolio formulas ----
    function portfolioPoint(wa, ra, rb, sa, sb, rab) {
      // wa in [0,1], ra/rb/sa/sb in decimals (e.g., 0.10), rab in [-1,1]
      const sp = Math.sqrt(
        (wa * wa) * (sa * sa) +
        ((1 - wa) * (1 - wa)) * (sb * sb) +
        2 * wa * (1 - wa) * sa * sb * rab
      );
      const rp = wa * ra + (1 - wa) * rb;
      return { sp, rp };
    }

    // ---- Input parsing ----
    function readParams() {
      const ra = clamp((Number(raEl.value) || 0) / 100, 0, 0.30);
      const rb = clamp((Number(rbEl.value) || 0) / 100, 0, 0.30);
      const sa = clamp((Number(saEl.value) || 0) / 100, 0, 0.90);
      const sb = clamp((Number(sbEl.value) || 0) / 100, 0, 0.90);

      const wa = clamp((Number(waSlider.value) || 0) / 100, 0, 1);
      const rab = clamp(Number(rabSlider.value) || 0, -1, 1);

      return { ra, rb, sa, sb, wa, rab };
    }

    // ---- Chart drawing ----
    function resizeCanvasToDisplaySize(c) {
      const { width: cssW, height: cssH } = c.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const w = Math.round(cssW * dpr);
      const h = Math.round(cssH * dpr);
      if (c.width !== w || c.height !== h) {
        c.width = w;
        c.height = h;
      }
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0); // draw in CSS pixels
    }

    function drawAxes({ xMin, xMax, yMin, yMax, plot }) {
      const { left, top, right, bottom } = plot;

      // Clear
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Background
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Axes lines
      ctx.strokeStyle = "#000";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(left, top);
      ctx.lineTo(left, bottom);
      ctx.lineTo(right, bottom);
      ctx.stroke();

      // Ticks
      const nTicks = 5;
      ctx.font = "12px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif";
      ctx.fillStyle = "#000";
      ctx.strokeStyle = "#000";

      for (let i = 0; i <= nTicks; i++) {
        const tx = left + (i / nTicks) * (right - left);
        const xVal = xMin + (i / nTicks) * (xMax - xMin);

        ctx.beginPath();
        ctx.moveTo(tx, bottom);
        ctx.lineTo(tx, bottom + 6);
        ctx.stroke();
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.fillText(fmtPct(xVal), tx, bottom + 8);
      }

      for (let i = 0; i <= nTicks; i++) {
        const ty = bottom - (i / nTicks) * (bottom - top);
        const yVal = yMin + (i / nTicks) * (yMax - yMin);

        ctx.beginPath();
        ctx.moveTo(left, ty);
        ctx.lineTo(left - 6, ty);
        ctx.stroke();
        ctx.textAlign = "right";
        ctx.textBaseline = "middle";
        ctx.fillText(fmtPct(yVal), left - 8, ty);
      }

      // Title (inside plot area, top-center)
      ctx.textAlign = "center";
      ctx.textBaseline = "bottom";
      ctx.font = "16px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif";
      ctx.fillText("Portfolio Correlation, 2-Asset Case", (left + right) / 2, top - 10);

      // Axis labels
      ctx.font = "14px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif";
      ctx.textBaseline = "top";
      ctx.fillText("Portfolio Standard Deviation", (left + right) / 2, bottom + 38);

      // Y label rotated
      ctx.save();
      ctx.translate(left - 54, (top + bottom) / 2);
      ctx.rotate(-Math.PI / 2);
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      ctx.fillText("Portfolio Expected Return", 0, 0);
      ctx.restore();
    }

    function makeScales({ xMin, xMax, yMin, yMax, plot }) {
      const { left, top, right, bottom } = plot;

      const xToPx = (x) => left + ((x - xMin) / (xMax - xMin)) * (right - left);
      const yToPx = (y) => bottom - ((y - yMin) / (yMax - yMin)) * (bottom - top);

      return { xToPx, yToPx };
    }

    function drawFrontier(points, xToPx, yToPx) {
      if (!points.length) return;
      ctx.strokeStyle = "#000";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(xToPx(points[0].sp), yToPx(points[0].rp));
      for (let i = 1; i < points.length; i++) {
        ctx.lineTo(xToPx(points[i].sp), yToPx(points[i].rp));
      }
      ctx.stroke();
    }

    function drawDot(x, y, label) {
      ctx.fillStyle = "#000";
      ctx.beginPath();
      ctx.arc(x, y, 4, 0, Math.PI * 2);
      ctx.fill();

      ctx.font = "13px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif";
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      ctx.fillText(label, x + 8, y);
    }

    function drawX(x, y, label) {
      ctx.strokeStyle = "#000";
      ctx.lineWidth = 2;
      const s = 7;
      ctx.beginPath();
      ctx.moveTo(x - s, y - s);
      ctx.lineTo(x + s, y + s);
      ctx.moveTo(x - s, y + s);
      ctx.lineTo(x + s, y - s);
      ctx.stroke();

      ctx.fillStyle = "#000";
      ctx.font = "13px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif";
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      ctx.fillText(label, x + 10, y);
    }

    function draw() {
      resizeCanvasToDisplaySize(canvas);

      const { ra, rb, sa, sb, wa, rab } = readParams();

      // Axis ranges per spec
      const xMin = 0;
      const xMax = clamp(Math.max(sa, sb) + 0.10, 0, 1.0); // 0% .. higher sigma + 10%
      const yMin = 0;
      const yMax = clamp(Math.max(ra, rb) + 0.10, 0, 0.40); // 0% .. higher return + 10%

      // Plot rectangle (leave room for labels/ticks)
      const plot = { left: 78, top: 56, right: canvas.getBoundingClientRect().width - 24, bottom: canvas.getBoundingClientRect().height - 88 };

      drawAxes({ xMin, xMax, yMin, yMax, plot });
      const { xToPx, yToPx } = makeScales({ xMin, xMax, yMin, yMax, plot });

      // Frontier curve for wa from 0..1
      const pts = [];
      for (let i = 0; i <= 100; i++) {
        const w = i / 100;
        pts.push(portfolioPoint(w, ra, rb, sa, sb, rab));
      }
      drawFrontier(pts, xToPx, yToPx);

      // Points A (wa=100%) and B (wa=0%)
      const A = portfolioPoint(1, ra, rb, sa, sb, rab);
      const B = portfolioPoint(0, ra, rb, sa, sb, rab);
      drawDot(xToPx(B.sp), yToPx(B.rp), "B");
      drawDot(xToPx(A.sp), yToPx(A.rp), "A");

      // Current point P (wa as selected)
      const P = portfolioPoint(wa, ra, rb, sa, sb, rab);
      drawX(xToPx(P.sp), yToPx(P.rp), "P");
    }

    // ---- Wiring ----
    function syncDisplays() {
      waVal.textContent = String(waSlider.value);
      rabVal.textContent = Number(rabSlider.value).toFixed(2);
    }

    const redrawOn = ["input", "change"];
    [raEl, rbEl, saEl, sbEl, waSlider, rabSlider].forEach(el => {
      redrawOn.forEach(evt => el.addEventListener(evt, () => {
        // keep values within bounds (in case of manual entry)
        raEl.value = clamp(Number(raEl.value) || 0, 0, 30);
        rbEl.value = clamp(Number(rbEl.value) || 0, 0, 30);
        saEl.value = clamp(Number(saEl.value) || 0, 0, 90);
        sbEl.value = clamp(Number(sbEl.value) || 0, 0, 90);
        waSlider.value = clamp(Number(waSlider.value) || 0, 0, 100);
        rabSlider.value = clamp(Number(rabSlider.value) || 0, -1, 1).toFixed(2);

        syncDisplays();
        draw();
      }));
    });

    resetBtn.addEventListener("click", () => setDefaults());
    window.addEventListener("resize", () => draw());

    // Init
    setDefaults();
  </script>
</body>
</html>
