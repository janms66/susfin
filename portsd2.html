<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Portfolio Correlation, 2-Asset Case</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 18px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #fff;
      color: #000;
    }
    .wrap { max-width: 980px; margin: 0 auto; }
    h1 { font-size: 20px; margin: 0 0 12px 0; font-weight: 650; }
    .panel {
      border: 1px solid #000;
      padding: 12px;
      margin-bottom: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(110px, 1fr));
      gap: 10px;
      align-items: end;
    }
    .field label {
      display: block;
      font-size: 12px;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 10px;
      border: 1px solid #000;
      background: #fff;
      color: #000;
      font-size: 14px;
      border-radius: 0;
      outline: none;
    }
    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    button {
      border: 1px solid #000;
      background: #fff;
      color: #000;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 14px;
    }
    button:active { transform: translateY(1px); }
    .hint { font-size: 12px; }
    .formula {
      margin: 14px 0 10px 0;
      font-size: 16px;
      text-align: center;
    }
    .formula .math { display: inline-block; padding: 6px 10px; border: 1px solid #000; }
    .chartBox {
      border: 1px solid #000;
      padding: 10px;
    }
    canvas { display: block; width: 100%; height: auto; background: #fff; }
    .sliderRow {
      margin-top: 12px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
    }
    .sliderRow label {
      font-size: 12px;
    }
    .sliderLine {
      display: grid;
      grid-template-columns: 1fr 70px;
      gap: 10px;
      align-items: center;
    }
    input[type="range"] { width: 100%; }
    .mono { font-variant-numeric: tabular-nums; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
    .err { color: #000; font-size: 12px; }
    @media (max-width: 820px) {
      .grid { grid-template-columns: repeat(2, minmax(140px, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Portfolio Correlation, 2-Asset Case</h1>

    <div class="panel">
      <div class="grid" aria-label="Parameter entry boxes">
        <div class="field">
          <label for="wa">weight in A (w<sub>A</sub>, %)</label>
          <input id="wa" type="number" inputmode="decimal" min="0" max="100" step="0.1" />
        </div>

        <div class="field">
          <label for="ra">return A (r<sub>A</sub>, %)</label>
          <input id="ra" type="number" inputmode="decimal" min="0" max="30" step="0.1" />
        </div>

        <div class="field">
          <label for="sa">standard deviation A (σ<sub>A</sub>, %)</label>
          <input id="sa" type="number" inputmode="decimal" min="0" max="90" step="0.1" />
        </div>

        <div class="field">
          <label for="rb">return B (r<sub>B</sub>, %)</label>
          <input id="rb" type="number" inputmode="decimal" min="0" max="30" step="0.1" />
        </div>

        <div class="field">
          <label for="sb">standard deviation B (σ<sub>B</sub>, %)</label>
          <input id="sb" type="number" inputmode="decimal" min="0" max="90" step="0.1" />
        </div>

        <div class="field">
          <label>&nbsp;</label>
          <button id="reset" type="button">Reset</button>
        </div>
      </div>

      <div class="actions">
        <div class="hint mono" id="status"></div>
        <div class="err mono" id="err"></div>
      </div>

      <div class="formula" aria-label="Formula display">
        <span class="math">
          σ<sub>P</sub> =
          √(
          w<sub>A</sub><sup>2</sup>σ<sub>A</sub><sup>2</sup>
          + (1 − w<sub>A</sub>)<sup>2</sup>σ<sub>B</sub><sup>2</sup>
          + 2w<sub>A</sub>(1 − w<sub>A</sub>)σ<sub>A</sub>σ<sub>B</sub>ρ<sub>AB</sub>
          )
        </span>
      </div>

      <div class="chartBox">
        <canvas id="chart" width="900" height="520" aria-label="Portfolio plot"></canvas>

        <div class="sliderRow">
          <label for="rab">correlation between A and B</label>
          <div class="sliderLine">
            <input id="rab" type="range" min="-1" max="1" step="0.01" />
            <div class="mono" id="rabVal"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ----- Defaults -----
    const DEFAULTS = {
      wa: 50,  // %
      ra: 10,  // %
      sa: 10,  // %
      rb: 15,  // %
      sb: 20,  // %
      rab: 0   // correlation
    };

    // ----- DOM -----
    const el = {
      wa: document.getElementById("wa"),
      ra: document.getElementById("ra"),
      sa: document.getElementById("sa"),
      rb: document.getElementById("rb"),
      sb: document.getElementById("sb"),
      rab: document.getElementById("rab"),
      rabVal: document.getElementById("rabVal"),
      reset: document.getElementById("reset"),
      canvas: document.getElementById("chart"),
      status: document.getElementById("status"),
      err: document.getElementById("err"),
    };

    const ctx = el.canvas.getContext("2d");

    // Plot ranges (in percent units, not decimals)
    const XR = { min: 0, max: 90 }; // Portfolio Standard Deviation
    const YR = { min: 0, max: 40 }; // Portfolio Expected Return

    // Margins for the plotting area
    const M = { left: 85, right: 20, top: 55, bottom: 70 };

    function clamp(x, a, b) { return Math.min(b, Math.max(a, x)); }

    function setDefaults() {
      el.wa.value = DEFAULTS.wa;
      el.ra.value = DEFAULTS.ra;
      el.sa.value = DEFAULTS.sa;
      el.rb.value = DEFAULTS.rb;
      el.sb.value = DEFAULTS.sb;
      el.rab.value = DEFAULTS.rab;
      el.rabVal.textContent = DEFAULTS.rab.toFixed(2);
      redraw();
    }

    // Convert form values to numbers with clamping
    function readParams() {
      const wa = clamp(Number(el.wa.value), 0, 100) / 100; // decimal weight
      const ra = clamp(Number(el.ra.value), 0, 30) / 100;  // decimal return
      const rb = clamp(Number(el.rb.value), 0, 30) / 100;
      const sa = clamp(Number(el.sa.value), 0, 90) / 100;  // decimal stdev
      const sb = clamp(Number(el.sb.value), 0, 90) / 100;
      const rab = clamp(Number(el.rab.value), -1, 1);

      // Write clamped values back so UI stays consistent
      el.wa.value = (wa * 100).toFixed(1).replace(/\.0$/, "");
      el.ra.value = (ra * 100).toFixed(1).replace(/\.0$/, "");
      el.rb.value = (rb * 100).toFixed(1).replace(/\.0$/, "");
      el.sa.value = (sa * 100).toFixed(1).replace(/\.0$/, "");
      el.sb.value = (sb * 100).toFixed(1).replace(/\.0$/, "");
      el.rab.value = rab;
      el.rabVal.textContent = rab.toFixed(2);

      return { wa, ra, rb, sa, sb, rab };
    }

    // Compute rp, sp (returns decimals)
    function portfolio(wa, ra, rb, sa, sb, rab) {
      const rp = wa * ra + (1 - wa) * rb;
      const variance =
        (wa * wa) * (sa * sa) +
        ((1 - wa) * (1 - wa)) * (sb * sb) +
        2 * wa * (1 - wa) * sa * sb * rab;

      // Guard against tiny negative from floating point
      const sp = Math.sqrt(Math.max(0, variance));
      return { rp, sp };
    }

    // Plot mapping
    function plotRect() {
      const w = el.canvas.width;
      const h = el.canvas.height;
      return {
        x0: M.left,
        y0: M.top,
        x1: w - M.right,
        y1: h - M.bottom,
        w: (w - M.left - M.right),
        h: (h - M.top - M.bottom)
      };
    }

    function xToPx(xPct) {
      const r = plotRect();
      return r.x0 + ( (xPct - XR.min) / (XR.max - XR.min) ) * r.w;
    }
    function yToPx(yPct) {
      const r = plotRect();
      // invert y
      return r.y1 - ( (yPct - YR.min) / (YR.max - YR.min) ) * r.h;
    }

    // Drawing helpers
    function clear() {
      ctx.clearRect(0, 0, el.canvas.width, el.canvas.height);
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, el.canvas.width, el.canvas.height);
      ctx.strokeStyle = "#000";
      ctx.fillStyle = "#000";
      ctx.lineWidth = 1;
    }

    function drawAxes() {
      const r = plotRect();

      // border of plot area
      ctx.strokeStyle = "#000";
      ctx.lineWidth = 1;
      ctx.strokeRect(r.x0, r.y0, r.w, r.h);

      // ticks
      ctx.font = "12px system-ui, -apple-system, Segoe UI, Roboto, Arial";
      ctx.fillStyle = "#000";
      ctx.strokeStyle = "#000";

      // X ticks every 10%
      for (let x = XR.min; x <= XR.max; x += 10) {
        const px = xToPx(x);
        ctx.beginPath();
        ctx.moveTo(px, r.y1);
        ctx.lineTo(px, r.y1 + 6);
        ctx.stroke();
        const txt = `${x}%`;
        const tw = ctx.measureText(txt).width;
        ctx.fillText(txt, px - tw / 2, r.y1 + 22);
      }

      // Y ticks every 5%
      for (let y = YR.min; y <= YR.max; y += 5) {
        const py = yToPx(y);
        ctx.beginPath();
        ctx.moveTo(r.x0 - 6, py);
        ctx.lineTo(r.x0, py);
        ctx.stroke();
        const txt = `${y}%`;
        const tw = ctx.measureText(txt).width;
        ctx.fillText(txt, r.x0 - 10 - tw, py + 4);
      }

      // Title
      ctx.font = "18px system-ui, -apple-system, Segoe UI, Roboto, Arial";
      const title = "Portfolio Correlation, 2-Asset Case";
      const tw = ctx.measureText(title).width;
      ctx.fillText(title, (el.canvas.width - tw) / 2, 28);

      // Axis labels
      ctx.font = "14px system-ui, -apple-system, Segoe UI, Roboto, Arial";
      const xLabel = "Portfolio Standard Deviation";
      const xw = ctx.measureText(xLabel).width;
      ctx.fillText(xLabel, (el.canvas.width - xw) / 2, el.canvas.height - 24);

      const yLabel = "Portfolio Expected Return";
      ctx.save();
      ctx.translate(20, el.canvas.height / 2);
      ctx.rotate(-Math.PI / 2);
      const yw = ctx.measureText(yLabel).width;
      ctx.fillText(yLabel, -yw / 2, 0);
      ctx.restore();
    }

    function drawCurve(params) {
      const { ra, rb, sa, sb, rab } = params;
      ctx.strokeStyle = "#000";
      ctx.lineWidth = 2;

      ctx.beginPath();
      for (let i = 0; i <= 200; i++) {
        const wa = i / 200; // 0..1
        const { rp, sp } = portfolio(wa, ra, rb, sa, sb, rab);
        const xPct = sp * 100;
        const yPct = rp * 100;

        const px = xToPx(xPct);
        const py = yToPx(yPct);

        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.stroke();
      ctx.lineWidth = 1;
    }

    function drawPoint(px, py, kind, label) {
      ctx.strokeStyle = "#000";
      ctx.fillStyle = "#000";
      ctx.lineWidth = 2;

      if (kind === "dot") {
        ctx.beginPath();
        ctx.arc(px, py, 4, 0, Math.PI * 2);
        ctx.fill();
      } else if (kind === "x") {
        const s = 7;
        ctx.beginPath();
        ctx.moveTo(px - s, py - s);
        ctx.lineTo(px + s, py + s);
        ctx.moveTo(px - s, py + s);
        ctx.lineTo(px + s, py - s);
        ctx.stroke();
      }

      ctx.lineWidth = 1;
      ctx.font = "13px system-ui, -apple-system, Segoe UI, Roboto, Arial";
      ctx.fillText(label, px + 8, py - 8);
    }

    function redraw() {
      const p = readParams();

      // Compute special points
      const A = portfolio(1, p.ra, p.rb, p.sa, p.sb, p.rab);
      const B = portfolio(0, p.ra, p.rb, p.sa, p.sb, p.rab);
      const P = portfolio(p.wa, p.ra, p.rb, p.sa, p.sb, p.rab);

      // Status line
      el.status.textContent =
        `A: (σ=${(A.sp*100).toFixed(2)}%, r=${(A.rp*100).toFixed(2)}%)   ` +
        `B: (σ=${(B.sp*100).toFixed(2)}%, r=${(B.rp*100).toFixed(2)}%)   ` +
        `P: (σ=${(P.sp*100).toFixed(2)}%, r=${(P.rp*100).toFixed(2)}%)`;

      // Basic validity note (still draw even if out of axis range)
      const inRange = (P.sp*100 >= XR.min && P.sp*100 <= XR.max && P.rp*100 >= YR.min && P.rp*100 <= YR.max);
      el.err.textContent = inRange ? "" : "Note: Current point P is outside the displayed axis range.";

      clear();
      drawAxes();
      drawCurve(p);

      // Draw A, B, P
      const Apx = xToPx(A.sp * 100), Apy = yToPx(A.rp * 100);
      const Bpx = xToPx(B.sp * 100), Bpy = yToPx(B.rp * 100);
      const Ppx = xToPx(P.sp * 100), Ppy = yToPx(P.rp * 100);

      drawPoint(Bpx, Bpy, "dot", "B");
      drawPoint(Apx, Apy, "dot", "A");
      drawPoint(Ppx, Ppy, "x", "P");
    }

    // ----- Wire up events -----
    ["input", "change"].forEach(evt => {
      el.wa.addEventListener(evt, redraw);
      el.ra.addEventListener(evt, redraw);
      el.rb.addEventListener(evt, redraw);
      el.sa.addEventListener(evt, redraw);
      el.sb.addEventListener(evt, redraw);
      el.rab.addEventListener(evt, redraw);
    });

    el.reset.addEventListener("click", setDefaults);

    // ----- Init -----
    setDefaults();
  </script>
</body>
</html>
